<!-- The Styled Link -->
<a href="https://google.com" 
   target="_blank" 
   rel="noopener noreferrer" 
   class="android-btn">
   Open Drive Folder
</a>

<!-- Android UI Styles -->
<style>
  .android-btn {
    /* Layout & Alignment */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    
    /* Android Material 3 Design Tokens */
    background-color: #6750A4;  /* Canonical Android Material Purple */
    color: #FFFFFF;             /* Crisp white text color */
    font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1px;
    text-decoration: none;
    
    /* Sizing & Shape */
    padding: 10px 24px;
    height: 40px;
    border-radius: 100px;       /* Fully pill-shaped rounded corners */
    box-sizing: border-box;
    
    /* Interactive Feedback Transitions */
    transition: background-color 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.15);
  }

  /* Tap / Hover State Feedback */
  .android-btn:hover {
    background-color: #533F8A;  /* Darkens slightly on hover */
    box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.25);
  }

  /* Active Pressed State Feedback */
  .android-btn:active {
    background-color: #433370;  /* Deeper color when actively pressed */
    transform: scale(0.98);     /* Minor scale down to mimic a physical click */
  }
</style>
